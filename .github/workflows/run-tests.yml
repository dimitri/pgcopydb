name: Run Tests

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

  # Manual trigger for a quick, PR-style run on any branch.
  # For a full PG16/17/18 matrix run, use the Nightly workflow instead.
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Phase 1: build base Docker images once per PostgreSQL version and cache
  # them as artifacts.  Every test job in build_package downloads the matching
  # artifact and loads it into its local Docker daemon before running make,
  # so the expensive C compilation and apt-install steps are never repeated.
  # ---------------------------------------------------------------------------
  build_images:
    name: Build base images (PG${{ matrix.PGVERSION }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        PGVERSION:
          - 16
          - 18
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # all history for all branches and tags

      - name: Set Version String From .git
        run: make version

      - name: Build pgcopydb image
        run: |
          docker build \
            --build-arg PGVERSION=${{ matrix.PGVERSION }} \
            -t pgcopydb:${{ matrix.PGVERSION }} \
            .

      - name: Build pagila base image
        run: |
          docker build \
            --build-arg PGVERSION=${{ matrix.PGVERSION }} \
            -t pagila:${{ matrix.PGVERSION }} \
            -f tests/Dockerfile.pagila \
            .

      - name: Save and compress images
        run: |
          docker save pgcopydb:${{ matrix.PGVERSION }} pagila:${{ matrix.PGVERSION }} \
            | zstd -T0 -9 - -o images.tar.zst

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-pg${{ matrix.PGVERSION }}
          path: images.tar.zst
          retention-days: 1

  # ---------------------------------------------------------------------------
  # The banned-API check has no Docker dependency and is cheap (~30 s).
  # Running it as its own job keeps it off the build_images critical path.
  # ---------------------------------------------------------------------------
  ci_check:
    name: Banned-API check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run banned.h check
        run: sh ./ci/banned.h.sh

  # ---------------------------------------------------------------------------
  # Phase 2: run each test against pre-built images.
  # ---------------------------------------------------------------------------
  build_package:
    name: Run tests
    runs-on: ubuntu-latest
    needs: build_images
    strategy:
      fail-fast: false
      matrix:
        # PR / push matrix: PG16 (smoke) + PG18 (full).
        #
        # PG17 is intentionally omitted here — it is covered by the nightly
        # full-matrix run.  PG18 (latest) gets every test; PG16 (oldest
        # supported) gets a representative core subset.  This keeps the PR
        # gate at ~23 jobs instead of 47.
        PGVERSION:
          - 16
          - 18
        TEST:
          - pagila
          - pagila-multi-steps
          - pagila-standby
          - unit
          - blobs
          - filtering
          - extensions
          - timescaledb
          - cdc-low-level
          - cdc-test-decoding
          - cdc-endpos-mid-txn
          - cdc-wal2json
          - cdc-partitioned-target
          - cdc-replica-identity-index
          - follow-wal2json
          - follow-9.6
          - follow-data-only
          - cdc-endpos-in-multi-wal-txn
        exclude:
          # timescaledb uses timescale/timescaledb:latest-pg13 for both source
          # and target. pg_restore from PG17+ emits "SET transaction_timeout = 0"
          # at connect time; the TimescaleDB pg13 server rejects this unknown GUC,
          # causing pg_restore to fail.  The test exercises TimescaleDB
          # compatibility, not PG version, so running it only under PG16 is fine.
          - TEST: timescaledb
            PGVERSION: 18

          # CDC / WAL-streaming / follow tests are version-agnostic at the
          # protocol level.  Running them on PG18 on every PR is enough signal;
          # PG16 coverage is provided by the nightly full-matrix run.
          - TEST: cdc-low-level
            PGVERSION: 16
          - TEST: cdc-test-decoding
            PGVERSION: 16
          - TEST: cdc-endpos-mid-txn
            PGVERSION: 16
          - TEST: cdc-wal2json
            PGVERSION: 16
          - TEST: cdc-partitioned-target
            PGVERSION: 16
          - TEST: cdc-replica-identity-index
            PGVERSION: 16
          - TEST: follow-wal2json
            PGVERSION: 16
          - TEST: follow-9.6
            PGVERSION: 16
          - TEST: follow-data-only
            PGVERSION: 16
          - TEST: cdc-endpos-in-multi-wal-txn
            PGVERSION: 16
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # all history for all branches and tags

      - name: Set Version String From .git
        run: make version

      - name: Set environment variables
        run: |
            echo "TEST=${{ matrix.TEST }}" >> $GITHUB_ENV
            echo "PGVERSION=${{ matrix.PGVERSION }}" >> $GITHUB_ENV

      - name: Download pre-built Docker images
        uses: actions/download-artifact@v4
        with:
          name: docker-images-pg${{ matrix.PGVERSION }}

      - name: Load and tag pre-built images
        run: |
          zstd -d < images.tar.zst | docker load
          docker tag pgcopydb:${{ matrix.PGVERSION }} pgcopydb
          docker tag pagila:${{ matrix.PGVERSION }} pagila

      - name: Create docker volumes
        run: |
          docker volume create ${TEST}

      - name: List docker volumes
        run: |
          docker volume ls

      - name: Docker Compose Version
        run: |
          docker compose version

      - name: Run a test
        timeout-minutes: 15
        run: |
          make tests/${TEST}

  style_checker:
    runs-on: ubuntu-latest
    container: citus/stylechecker:no-py
    steps:
    - uses: actions/checkout@v4.1.7
      name: Checkout code

    - name: Set safe directory for git
      run: |
        git config --global --add safe.directory ${GITHUB_WORKSPACE}

    - name: Check C style
      run: citus_indent --check

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build docs
        uses: ammaraskar/sphinx-action@master
        with:
          docs-folder: "docs/"

      - name: Set Version String From .git
        run: make version

      - name: Check that docs are up to date
        run: |
          cat Dockerfile ci/Dockerfile.docs.template > ci/Dockerfile.docs && \
          docker build --file=ci/Dockerfile.docs --tag test-docs . && \
          docker run test-docs
