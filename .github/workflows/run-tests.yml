name: Run Tests

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

  # Manual trigger for a quick, PR-style run on any branch.
  # For a full PG16/17/18 matrix run, use the Nightly workflow instead.
  workflow_dispatch:

jobs:
  build_package:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # PR / push matrix: PG16 (smoke) + PG18 (full).
        #
        # PG17 is intentionally omitted here — it is covered by the nightly
        # full-matrix run.  PG18 (latest) gets every test; PG16 (oldest
        # supported) gets a representative core subset.  This keeps the PR
        # gate at ~25 jobs instead of 49.
        PGVERSION:
          - 16
          - 18
        TEST:
          - ci
          - pagila
          - pagila-multi-steps
          - pagila-standby
          - unit
          - blobs
          - filtering
          - extensions
          - timescaledb
          - cdc-low-level
          - cdc-test-decoding
          - cdc-endpos-mid-txn
          - cdc-wal2json
          - cdc-transform-apply
          - cdc-partitioned-target
          - cdc-replica-identity-index
          - follow-wal2json
          - follow-9.6
          - follow-data-only
          - endpos-in-multi-wal-txn
        exclude:
          # timescaledb uses timescale/timescaledb:latest-pg13 for both source
          # and target. pg_restore from PG17+ emits "SET transaction_timeout = 0"
          # at connect time; the TimescaleDB pg13 server rejects this unknown GUC,
          # causing pg_restore to fail.  The test exercises TimescaleDB
          # compatibility, not PG version, so running it only under PG16 is fine.
          - TEST: timescaledb
            PGVERSION: 18

          # CDC / WAL-streaming / follow tests are version-agnostic at the
          # protocol level.  Running them on PG18 on every PR is enough signal;
          # PG16 coverage is provided by the nightly full-matrix run.
          - TEST: cdc-low-level
            PGVERSION: 16
          - TEST: cdc-test-decoding
            PGVERSION: 16
          - TEST: cdc-endpos-mid-txn
            PGVERSION: 16
          - TEST: cdc-wal2json
            PGVERSION: 16
          - TEST: cdc-transform-apply
            PGVERSION: 16
          - TEST: cdc-partitioned-target
            PGVERSION: 16
          - TEST: cdc-replica-identity-index
            PGVERSION: 16
          - TEST: follow-wal2json
            PGVERSION: 16
          - TEST: follow-9.6
            PGVERSION: 16
          - TEST: follow-data-only
            PGVERSION: 16
          - TEST: endpos-in-multi-wal-txn
            PGVERSION: 16
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # all history for all branches and tags

      - name: Set Version String From .git
        run: make version

      - name: Set environment variables
        run: |
            echo "TEST=${{ matrix.TEST }}" >> $GITHUB_ENV
            echo "PGVERSION=${{ matrix.PGVERSION }}" >> $GITHUB_ENV

      - name: Create docker volumes
        run: |
          docker volume create ${TEST}

      - name: List docker volumes
        run: |
          docker volume ls

      - name: Docker Compose Version
        run: |
          docker compose version

      - name: Run a test
        timeout-minutes: 15
        run: |
          make tests/${TEST}

  style_checker:
    runs-on: ubuntu-latest
    container: citus/stylechecker:no-py
    steps:
    - uses: actions/checkout@v4.1.7
      name: Checkout code

    - name: Set safe directory for git
      run: |
        git config --global --add safe.directory ${GITHUB_WORKSPACE}

    - name: Check C style
      run: citus_indent --check

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build docs
        uses: ammaraskar/sphinx-action@master
        with:
          docs-folder: "docs/"

      - name: Set Version String From .git
        run: make version

      - name: Check that docs are up to date
        run: |
          cat Dockerfile ci/Dockerfile.docs.template > ci/Dockerfile.docs && \
          docker build --file=ci/Dockerfile.docs --tag test-docs . && \
          docker run test-docs
