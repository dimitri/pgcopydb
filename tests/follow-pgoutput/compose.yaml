services:
  source:
    image: postgres-pgoutput:${PGVERSION:-16}
    build:
      context: .
      dockerfile: Dockerfile.pg
    expose:
      - 5432
    env_file:
      - ../postgres.env
    command: >
      -c wal_level=logical
      -c ssl=on
      -c ssl_cert_file=/etc/ssl/certs/ssl-cert-snakeoil.pem
      -c ssl_key_file=/etc/ssl/private/ssl-cert-snakeoil.key

  target:
    image: postgres:${PGVERSION:-16}
    expose:
      - 5432
    env_file:
      - ../postgres.env
    command: >
      -c ssl=on
      -c ssl_cert_file=/etc/ssl/certs/ssl-cert-snakeoil.pem
      -c ssl_key_file=/etc/ssl/private/ssl-cert-snakeoil.key

  inject:
    build:
      context: .
      dockerfile: Dockerfile.inject
    env_file:
      - ../uris.env
      - ../paths.env
    environment:
      PGCOPYDB_HOST: test
      PGCOPYDB_PORT: "5442"

  test:
    image: follow-pgoutput
    build: .
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    environment:
      PGCOPYDB_TABLE_JOBS: 4
      PGCOPYDB_INDEX_JOBS: 2
      PGCOPYDB_HOST: "0.0.0.0"
      PGCOPYDB_PORT: "5442"
    env_file:
      - ../uris.env
      - ../paths.env
    depends_on:
      - source
      - target
      - inject
