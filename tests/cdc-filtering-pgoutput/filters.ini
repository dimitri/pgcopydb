#
# cdc-filtering-pgoutput/filters.ini
#
# Exclude the 'staff' table from the migration.  The test verifies that:
#   1. The initial clone respects the filter (staff is absent on target).
#   2. CDC changes to 'staff' are not replayed to the target.
#   3. CDC changes to other tables (e.g. actor) ARE replayed correctly.
#

[exclude-table]
public.staff
